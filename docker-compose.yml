services:
  db:
    image: postgres:15-alpine
    container_name: novapay_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: novapay_db
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app-admin:
    build: ./Novapay-admin
    container_name: novapay_app_admin
    ports:
      - "3001:3001"
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: novapay_db

  app-user:
    build: ./Novapay-user
    container_name: novapay_app_user
    command: sh -c "sleep 5 && node index.js"
    ports:
      - "3002:3002"
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: novapay_db
